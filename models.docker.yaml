# Models configuration baked into the Docker image. The gateway never
# spawns subprocesses for these — vLLM serves them directly via the
# OpenAI-compatible REST surface defined in compose.yml.
#
# Customize by mounting a different models.yaml at /app/provider/models.yaml.

server:
  llama_server_bin: ""   # unused: every model below sets backend=vllm
  # Docker deployment: auto-discovered LM Studio models are served by the
  # sibling-container runner, not by a local subprocess inside the gateway.
  lmstudio_backend: container
  # Read-only host mount provided by compose.yml. Any GGUFs the operator
  # has under ``$HOME/.lmstudio/models`` show up as ``lmstudio/<pub>/<model>``
  # ids — but stay invisible to end users until an admin publishes them.
  lmstudio_dir: /lmstudio

gateway:
  host: 0.0.0.0
  port: 8088

rag:
  backend: lance
  lance_dir: /app/data/lance
  embedding_dim: 4096
  default_top_k: 6
  chunk_chars: 1200
  chunk_overlap: 150

# No default models. The admin configures chat / embedding / vision from the
# webui after selecting from the auto-discovered LM Studio GGUFs (read-only
# mounted at /lmstudio) or by adding a vLLM endpoint when the ``vllm`` compose
# profile is active.
models: []
