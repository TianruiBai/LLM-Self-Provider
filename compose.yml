# Production compose stack — Phase C/D.
#
# Bring up the full self-provider with one command:
#     docker compose up -d
#
# Required env (put in `.env` next to this file):
#   PROVIDER_AUTH_PEPPER          — 64 hex chars (used to HMAC-prefix passwords)
#   PROVIDER_MASTER_KEY           — 64 hex chars (used to seal TOTP secrets)
#   PROVIDER_BOOTSTRAP_ADMIN_USER — first admin username, created on first run
#   PROVIDER_BOOTSTRAP_ADMIN_PASSWORD
#   HF_TOKEN                       — optional, required for gated models
#
# Inference is performed by sibling **llama-server** containers spawned on
# demand by the gateway (see provider/llama_runner.py). The image is built
# from the antirez ``llama.cpp-deepseek-v4-flash`` fork, which supports
# DeepSeek-V4-Flash on top of upstream model coverage.
#
# Build the inference image once before first use:
#     docker compose --profile build-llama build llama-server
# (or just ``make build-llama``).

services:
  # Build-only service: produces ``provider-llama-server:local``, the image
  # spawned per slot by the gateway's llama_runner. Never started as a
  # long-running service — sibling containers handle that.
  llama-server:
    profiles: ["build-llama"]
    image: provider-llama-server:local
    build:
      context: ../llama.cpp-deepseek-v4-flash
      dockerfile: .devops/cuda.Dockerfile
      target: server
      args:
        CUDA_VERSION: "12.8.1"
    command: ["--help"]

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    # Allow the gateway to reach host-side backends (e.g. LM Studio on
    # http://host.docker.internal:1234). On Linux this gets translated to
    # the host gateway IP automatically; on Docker Desktop it's a no-op.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROVIDER_AUTH_PEPPER: ${PROVIDER_AUTH_PEPPER:?must be set}
      PROVIDER_MASTER_KEY: ${PROVIDER_MASTER_KEY:?must be set}
      PROVIDER_BOOTSTRAP_ADMIN_USER: ${PROVIDER_BOOTSTRAP_ADMIN_USER:-admin}
      PROVIDER_BOOTSTRAP_ADMIN_PASSWORD: ${PROVIDER_BOOTSTRAP_ADMIN_PASSWORD:?must be set}
      PROVIDER_FORCE_SECURE_COOKIE: ${PROVIDER_FORCE_SECURE_COOKIE:-0}
      PROVIDER_PUBLIC_BASE_URL: ${PROVIDER_PUBLIC_BASE_URL:-}
      # OIDC (optional)
      PROVIDER_OIDC_GITHUB_CLIENT_ID: ${PROVIDER_OIDC_GITHUB_CLIENT_ID:-}
      PROVIDER_OIDC_GITHUB_CLIENT_SECRET: ${PROVIDER_OIDC_GITHUB_CLIENT_SECRET:-}
      PROVIDER_OIDC_GOOGLE_CLIENT_ID: ${PROVIDER_OIDC_GOOGLE_CLIENT_ID:-}
      PROVIDER_OIDC_GOOGLE_CLIENT_SECRET: ${PROVIDER_OIDC_GOOGLE_CLIENT_SECRET:-}
      # Sibling-container llama.cpp runner: the gateway shells the docker
      # daemon via the bind-mounted socket to start a swappable
      # ``provider-llama-server`` container per slot (chat / embed). The
      # sibling needs the same paths the gateway discovered, so we forward
      # the host LM Studio dir.
      LMSTUDIO_HOST_DIR: ${LMSTUDIO_DIR:-${HOME:-/root}/.lmstudio/models}
      DOCKER_NETWORK: ${COMPOSE_PROJECT_NAME:-provider}_default
      HF_CACHE_VOLUME: ${COMPOSE_PROJECT_NAME:-provider}_hf-cache
      LLAMA_IMAGE: ${LLAMA_IMAGE:-provider-llama-server:local}
      # Default sibling-container context window. 163840 = the
      # DeepSeek-V4-Flash "stable-164k" target; ordinary GGUFs that report
      # a lower trained ctx will be capped by llama-server itself, so
      # raising this default doesn't hurt smaller models.
      LLAMA_CTX_SIZE: ${LLAMA_CTX_SIZE:-163840}
      LLAMA_NGL: ${LLAMA_NGL:-999}
      # Dual-GPU dispatch policy. CUDA0 (RTX PRO 4000) is reserved for the
      # main chat workload; CUDA1 is reserved for helpers (embeddings,
      # Gemma E4B vision pre-processor, Qwen sub-agent). The runner refuses
      # to launch chat-kind models on the helper GPU even when an operator
      # hand-pins ``--device CUDA1`` in models.yaml.
      PROVIDER_CHAT_GPU: ${PROVIDER_CHAT_GPU:-CUDA0}
      PROVIDER_HELPER_GPU: ${PROVIDER_HELPER_GPU:-CUDA1}
      # Per-user chat container budget. With 1 (default) only one chat
      # container runs at a time across all users; LRU-evict makes room
      # for the next request. Raise on multi-GPU hosts.
      LLAMA_CHAT_MAX_CONCURRENT: ${LLAMA_CHAT_MAX_CONCURRENT:-1}
      # Hard cap on how many CUDA1 helper containers (embed / sub_agent /
      # vision) may run at once. Default 2 matches the user policy of
      # "at most two helpers on the small GPU at any time".
      LLAMA_HELPER_MAX_CONCURRENT: ${LLAMA_HELPER_MAX_CONCURRENT:-2}
      # Per-runner-container memory cap. On Windows / Docker Desktop a
      # runaway llama-server can otherwise consume the entire WSL2 VM and
      # take Hyper-V down with it. Empty disables the cap. Default 48g
      # leaves headroom on a 64 GB host; tune to your machine.
      LLAMA_MEM_LIMIT: ${LLAMA_MEM_LIMIT:-48g}
      # Private SHM size per runner. We no longer share the host IPC
      # namespace (which was the proximate cause of the hypervisor wedge),
      # so 1g is plenty for single-GPU llama.cpp.
      LLAMA_SHM_SIZE: ${LLAMA_SHM_SIZE:-1g}
      # On Windows + WSL2, mmap-ing large GGUFs from a host bind mount can
      # race the GPU paravirt driver and crash Hyper-V. Set to 1 if you
      # see hypervisor wedges when loading 27B+ models. Default off.
      LLAMA_NO_MMAP: ${LLAMA_NO_MMAP:-0}
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8088:8088"
    volumes:
      - control-db:/app/data
      - lance:/app/data/lance
      - ./models.docker.yaml:/app/provider/models.yaml:ro
      # Mount the host's LM Studio model cache *read-only* so the gateway
      # can auto-discover GGUFs without ever mutating them. Set
      # ``LMSTUDIO_DIR`` in .env to override the default ``$HOME/.lmstudio/models``.
      - ${LMSTUDIO_DIR:-${HOME:-/root}/.lmstudio/models}:/lmstudio:ro
      # Docker socket so the gateway can manage swappable sibling vLLM
      # containers (see provider/vllm_runner.py).
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  hf-cache:
  control-db:
  lance:
