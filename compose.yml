# Production compose stack — Phase C/D.
#
# Bring up the full self-provider with one command:
#     docker compose up -d
#
# Required env (put in `.env` next to this file):
#   PROVIDER_AUTH_PEPPER          — 64 hex chars (used to HMAC-prefix passwords)
#   PROVIDER_MASTER_KEY           — 64 hex chars (used to seal TOTP secrets)
#   PROVIDER_BOOTSTRAP_ADMIN_USER — first admin username, created on first run
#   PROVIDER_BOOTSTRAP_ADMIN_PASSWORD
#   HF_TOKEN                       — optional, required for gated models
#   VLLM_CHAT_MODEL                — HF repo id; leave blank to skip vllm-chat
#   VLLM_EMBED_MODEL               — HF repo id; leave blank to skip vllm-embed
#   VLLM_VISION_MODEL              — HF repo id; leave blank to skip vllm-vision
#   VLLM_GPU_UTIL                  — 0..1, default 0.85
#
# By default `docker compose up` only starts the gateway. To also start the
# vLLM workers (after setting the *_MODEL env vars), use:
#     docker compose --profile vllm up -d
#
# A typical layout uses one Docker volume for HF cache, one for Lance, and one
# for the SQLite control DB so backups can target a single tree.

services:
  vllm-chat:
    image: vllm/vllm-openai:v0.6.0
    profiles: ["vllm"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: 1
    runtime: nvidia
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    command: >
      --model ${VLLM_CHAT_MODEL}
      --gpu-memory-utilization ${VLLM_GPU_UTIL:-0.85}
      --max-model-len 32768
      --enable-auto-tool-choice
      --tool-call-parser hermes
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8001:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  vllm-embed:
    image: vllm/vllm-openai:v0.6.0
    profiles: ["vllm"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: 1
    runtime: nvidia
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    command: >
      --model ${VLLM_EMBED_MODEL}
      --task embed
      --gpu-memory-utilization 0.5
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8002:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  vllm-vision:
    image: vllm/vllm-openai:v0.6.0
    profiles: ["vllm"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
              count: 1
    runtime: nvidia
    environment:
      HUGGING_FACE_HUB_TOKEN: ${HF_TOKEN:-}
    command: >
      --model ${VLLM_VISION_MODEL}
      --gpu-memory-utilization 0.4
      --max-model-len 8192
    volumes:
      - hf-cache:/root/.cache/huggingface
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/v1/models || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
    # Allow the gateway to reach host-side backends (e.g. LM Studio on
    # http://host.docker.internal:1234). On Linux this gets translated to
    # the host gateway IP automatically; on Docker Desktop it's a no-op.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PROVIDER_AUTH_PEPPER: ${PROVIDER_AUTH_PEPPER:?must be set}
      PROVIDER_MASTER_KEY: ${PROVIDER_MASTER_KEY:?must be set}
      PROVIDER_BOOTSTRAP_ADMIN_USER: ${PROVIDER_BOOTSTRAP_ADMIN_USER:-admin}
      PROVIDER_BOOTSTRAP_ADMIN_PASSWORD: ${PROVIDER_BOOTSTRAP_ADMIN_PASSWORD:?must be set}
      PROVIDER_FORCE_SECURE_COOKIE: ${PROVIDER_FORCE_SECURE_COOKIE:-0}
      PROVIDER_PUBLIC_BASE_URL: ${PROVIDER_PUBLIC_BASE_URL:-}
      # OIDC (optional)
      PROVIDER_OIDC_GITHUB_CLIENT_ID: ${PROVIDER_OIDC_GITHUB_CLIENT_ID:-}
      PROVIDER_OIDC_GITHUB_CLIENT_SECRET: ${PROVIDER_OIDC_GITHUB_CLIENT_SECRET:-}
      PROVIDER_OIDC_GOOGLE_CLIENT_ID: ${PROVIDER_OIDC_GOOGLE_CLIENT_ID:-}
      PROVIDER_OIDC_GOOGLE_CLIENT_SECRET: ${PROVIDER_OIDC_GOOGLE_CLIENT_SECRET:-}
      # vLLM sibling-container runner: the gateway shells the docker daemon
      # via the bind-mounted socket to start a swappable vllm/vllm-openai
      # container per slot (chat / embed). The sibling needs the same paths
      # the gateway discovered, so we forward the host LM Studio dir.
      LMSTUDIO_HOST_DIR: ${LMSTUDIO_DIR:-${HOME:-/root}/.lmstudio/models}
      DOCKER_NETWORK: ${COMPOSE_PROJECT_NAME:-provider}_default
      HF_CACHE_VOLUME: ${COMPOSE_PROJECT_NAME:-provider}_hf-cache
      VLLM_IMAGE: ${VLLM_IMAGE:-vllm/vllm-openai:cu130-nightly}
      VLLM_GPU_UTIL: ${VLLM_GPU_UTIL:-0.85}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-8192}
      HF_TOKEN: ${HF_TOKEN:-}
    ports:
      - "8088:8088"
    volumes:
      - control-db:/app/data
      - lance:/app/data/lance
      - ./models.docker.yaml:/app/provider/models.yaml:ro
      # Mount the host's LM Studio model cache *read-only* so the gateway
      # can auto-discover GGUFs without ever mutating them. Set
      # ``LMSTUDIO_DIR`` in .env to override the default ``$HOME/.lmstudio/models``.
      - ${LMSTUDIO_DIR:-${HOME:-/root}/.lmstudio/models}:/lmstudio:ro
      # Docker socket so the gateway can manage swappable sibling vLLM
      # containers (see provider/vllm_runner.py).
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  hf-cache:
  control-db:
  lance:
